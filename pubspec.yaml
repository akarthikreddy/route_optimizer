name: route_optimizer
description: Internal delivery route optimization app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Models
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

  # Map
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # Networking
  http: ^1.2.1

  # Storage
  shared_preferences: ^2.3.2

  # UI
  google_fonts: ^6.2.1

  # Navigation
  go_router: ^14.2.7

flutter:
  uses-material-design: true

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.13
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.3
  custom_lint: ^0.7.0
  riverpod_lint: ^2.3.13
