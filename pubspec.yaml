name: route_optimizer
description: Internal delivery route optimization app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^3.0.0
  riverpod_annotation: ^4.0.0

  # Models
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

  # Map
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # Networking
  http: ^1.2.1
  googleapis_auth: ^1.6.0

  # Storage
  shared_preferences: ^2.3.2

  # UI
  google_fonts: ^6.2.1

  # Navigation
  go_router: ^14.2.7

flutter:
  uses-material-design: true
  assets:
    - assets/woo_config.json
    - assets/service_account.json

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.13
  freezed: ^3.0.0
  json_serializable: ^6.8.0
  riverpod_generator: ^4.0.0
